name: Python CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  required-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff
          pip install -e .
      - name: Ruff
        run: ruff check src tests
      - name: Run tests
        run: pytest -q

  perf-signal:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: TDMA performance signal
        run: |
          mkdir -p perf-artifacts
          python tests/perf_tdma_signal.py | tee perf-artifacts/tdma-benchmark.txt
      - name: Upload perf artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdma-perf-signal
          path: perf-artifacts/tdma-benchmark.txt
